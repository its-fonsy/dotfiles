shell = /usr/bin/zsh

font=Ubuntu Mono:size=13:antialias=true

dpi-aware=yes
pad=10x10 center
bold-text-in-bright=palette-based
resize-delay-ms=90

[cursor]
style=block
blink=yes

[bell]
urgent=yes
notify=yes
visual=no

[mouse]
hide-when-typing=yes
alternate-scroll-mode=no

[url]
launch=xdg-open ${url}

[colors-dark]
alpha=0.9
foreground=ffffff
background=111111
regular0=2e3436
regular1=cc0000
regular2=4e9a06
regular3=c4a000
regular4=3465a4
regular5=75507b
regular6=06989a
regular7=d3d7cf
bright0=555753
bright1=ef2929
bright2=8ae234
bright3=fce94f
bright4=729fcf
bright5=ad7fa8
bright6=34e2e2
bright7=eeeeec
